<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="htmx-config" content='{"selfRequestsOnly":false}' />
    <title>Apxeer</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/gh/ChristianPavilonis/tauri-htmx-extension@latest/dist/tauri-htmx-extension.js"></script>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <header>
      <span class="logo-text">Apxeer</span>
    </header>

    <main>
      <section class="card">
        <h2>Recorder</h2>
        <div
          id="status"
          hx-post="command:get_recorder_status"
          hx-trigger="load, every 2s"
          hx-swap="innerHTML"
        >
          <div class="status status--offline">
            <span class="dot"></span>
            <span>Connecting...</span>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Account</h2>
        <div id="account-content">
          <span class="auth-loading">Loading...</span>
        </div>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <form id="settings-form">
          <div class="field">
            <label for="api_url">API URL</label>
            <input id="api_url" name="api_url" type="text" placeholder="http://localhost:8080" />
          </div>
          <div class="field">
            <label for="lmu_results_dir">LMU Results Folder</label>
            <input id="lmu_results_dir" name="lmu_results_dir" type="text" placeholder="Leave blank for default" />
          </div>
          <div class="field field--row">
            <input id="auto_upload" name="auto_upload" type="checkbox" />
            <label for="auto_upload">Auto-upload every 30s</label>
          </div>
          <div class="settings-footer">
            <span id="settings-msg" class="settings-msg"></span>
            <button type="submit">Save</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
