name: Deploy

on:
  # Stage: auto-deploy on every push to master
  push:
    branches: [master]

  # Stage or prod: manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod

# ── Stage ─────────────────────────────────────────────────────────────────────
# Runs on:
#   - push to master (automatic)
#   - workflow_dispatch with environment=stage (manual, any branch)

jobs:
  deploy-stage:
    name: Deploy → stage
    if: github.event_name == 'push' || inputs.environment == 'stage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function to stage
        run: |
          supabase functions deploy api \
            --project-ref ${{ secrets.STAGE_SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apxeer-web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: apxeer-web

      - name: Build web (stage)
        run: npm run build
        working-directory: apxeer-web
        env:
          VITE_API_URL: https://${{ secrets.STAGE_SUPABASE_PROJECT_REF }}.supabase.co/functions/v1
          VITE_SUPABASE_URL: ${{ secrets.STAGE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGE_SUPABASE_ANON_KEY }}

      - name: Deploy web to Cloudflare Pages (stage)
        run: npx wrangler pages deploy dist --project-name apxeer-web-staging --commit-dirty=true
        working-directory: apxeer-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

# ── Production ────────────────────────────────────────────────────────────────
# Runs on:
#   - workflow_dispatch with environment=prod AND on the master branch only

  deploy-prod:
    name: Deploy → prod
    if: inputs.environment == 'prod' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function to prod
        run: |
          supabase functions deploy api \
            --project-ref ${{ secrets.PROD_SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apxeer-web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: apxeer-web

      - name: Build web (prod)
        run: npm run build
        working-directory: apxeer-web
        env:
          VITE_API_URL: https://${{ secrets.PROD_SUPABASE_PROJECT_REF }}.supabase.co/functions/v1
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Deploy web to Cloudflare Pages (prod)
        run: npx wrangler pages deploy dist --project-name apxeer-web --commit-dirty=true
        working-directory: apxeer-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
