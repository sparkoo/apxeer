name: Deploy

on:
  # Staging: auto-deploy on every push to master
  push:
    branches: [master]

  # Production: manual trigger only
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options:
          - production

# ── Staging (push to master) ──────────────────────────────────────────────────

jobs:
  deploy-api-staging:
    name: API → staging
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apxeer-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app apxeer-api-staging --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web-staging:
    name: Web → staging
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apxeer-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apxeer-web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://apxeer-api-staging.fly.dev
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name apxeer-web-staging --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

# ── Production (manual workflow_dispatch) ─────────────────────────────────────

  deploy-api-production:
    name: API → production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apxeer-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app apxeer-api --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web-production:
    name: Web → production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apxeer-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apxeer-web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://apxeer-api.fly.dev
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name apxeer-web --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  build-desktop:
    name: Desktop → Windows build
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apxeer-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apxeer-desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apxeer-desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: apxeer-desktop-windows
          path: |
            apxeer-desktop/src-tauri/target/release/bundle/msi/*.msi
            apxeer-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
