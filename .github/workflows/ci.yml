name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ── Go API ────────────────────────────────────────────────────────────────
  api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apxeer-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apxeer-api/go.mod
          cache-dependency-path: apxeer-api/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

  # ── Web frontend ──────────────────────────────────────────────────────────
  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apxeer-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apxeer-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

  # ── Rust desktop (Windows — required by winapi + Tauri) ──────────────────
  desktop:
    name: Desktop (Rust)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apxeer-desktop/src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry & build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apxeer-desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('apxeer-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings
