name: Deploy → prod

on:
  workflow_dispatch:

jobs:
  guard:
    name: Verify master branch
    runs-on: ubuntu-latest
    steps:
      - name: Fail if not master
        if: github.ref != 'refs/heads/master'
        run: |
          echo "ERROR: prod deploy is only allowed from master (got ${{ github.ref }})"
          exit 1

  deploy:
    needs: guard
    uses: ./.github/workflows/_deploy.yml
    with:
      api_app: apexless-api
      web_app: apexless-web
      vite_api_url: https://apexless-api.fly.dev
    secrets: inherit
