# fly.toml — used for both staging and production.
# Deploy with:
#   flyctl deploy --app apxeer-api-staging   (staging)
#   flyctl deploy --app apxeer-api           (production)

app = "apxeer-api"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "requests"
  hard_limit = 100
  soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
