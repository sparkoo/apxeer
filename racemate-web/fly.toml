# App name is overridden at deploy time with --app flag.
# Create apps on Fly.io first:
#   flyctl apps create apexless-web
#   flyctl apps create apexless-web-stage
#   flyctl apps create apexless-web-dev
app = 'apexless-web'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
